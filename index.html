            <p>Hello world! This is HTML5 Boilerplate.</p>

        <div class="results"></div>
        <div id="cityImage"></div>
        
        <div id="agenda"></div>

        <script src="https://code.jquery.com/jquery-1.12.0.min.js"></script>
        <script>window.jQuery || document.write('<script src="js/vendor/jquery-1.12.0.min.js"><\/script>')</script>
        <script src="js/plugins.js"></script>

        <!-- Google Analytics: change UA-XXXXX-X to be your site's ID. -->
        <script>
            (function(b,o,i,l,e,r){b.GoogleAnalyticsObject=l;b[l]||(b[l]=
            function(){(b[l].q=b[l].q||[]).push(arguments)});b[l].l=+new Date;
            e=o.createElement(i);r=o.getElementsByTagName(i)[0];
            e.src='https://www.google-analytics.com/analytics.js';
            r.parentNode.insertBefore(e,r)}(window,document,'script','ga'));
            ga('create','UA-XXXXX-X','auto');ga('send','pageview');

        <script> 
            // Link to spreadsheet
            var url = "https://spreadsheets.google.com/feeds/list/1u3uLSpMRz_c1cQMHgzBhpLa9fJUr9s8xkRZZWWGrXqU/od6/public/values?alt=json";  
            
            function list(root) {
                var feed = root.feed;
                var entries = feed.entry || [];
                var html = ['<ul>'];

                for (var i = 0; i < entries.length; ++i) {
                    var entry = entries[i];
                    var title = (entry.title.type == 'html') ? entry.title.$t : escape(entry.title.$t);
                    var start = (entry['gd$when']) ? entry['gd$when'][0].startTime : "";	

                    html.push('<li>', start, ' ', title, '</li>');
                }

                html.push('</ul>');
                document.getElementById("agenda").innerHTML = html.join("");
            }
            
            $.getJSON(url, function(data) {
                var entry = data.feed.entry;
                var cityImage;
                $(entry).each(function(){
                    // Column names are name, age, etc.
                    if (this.gsx$location.$t == 'Charleston') {
                        cityImage = this.gsx$location.$t;
                        $('.results').prepend('<h2>'+this.gsx$location.$t+'</h2><p>'+this.gsx$image.$t+'</p>');
                        document.getElementById('cityImage').setAttribute('src', cityImage);
                    }
                    
                });
            });
        
        </script>
        <script src="https://spreadsheets.google.com/feeds/list/1u3uLSpMRz_c1cQMHgzBhpLa9fJUr9s8xkRZZWWGrXqU/od6/public/values?alt=json-in-script&callback=list">
        </script>
        
    </body>
